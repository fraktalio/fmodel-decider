services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fmodel
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./dcb_schema.sql:/docker-entrypoint-initdb.d/01-dcb-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
